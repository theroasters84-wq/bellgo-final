    <script>
        (function() {
            // PWA LOGIC
            const saved = localStorage.getItem('bellgo_session');
            const manifestLink = document.getElementById('dynamicManifest');
            let url = `/manifest.json?icon=admin`;
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    if (data.store) {
                        url += `&store=${encodeURIComponent(data.store)}`;
                        if (data.name) url += `&name=${encodeURIComponent(data.name)} (Staff)`;
                    }
                } catch(e) {}
            }
            // Add ID to separate from Order App
            url += "&id=staff_app"; // Αυτό τώρα ενεργοποιεί το ειδικό scope στον server
            manifestLink.href = url;
        })();
    </script>

    <script>
    // Helper for Staff App to calculate total (since it parses text differently)
    function calculateOrderTotal(text) {
        let total = 0;
        const lines = text.split('\n');
        lines.forEach(line => {
            const match = line.match(/^(\d+)?\s*(.+):(\d+(?:\.\d+)?)$/);
            if (match) {
                let qty = parseInt(match[1] || '1');
                let price = parseFloat(match[3]);
                total += qty * price;
            }
        });
        return total;
    }

    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";
        import { firebaseConfig, vapidKey } from './config.js';
        import { Sundromes } from './sundromes.js'; // ✅ Import Sundromes (Case Sensitive Fix)

        // ✅ INIT FIREBASE & EXPOSE TO WINDOW
        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);
        
        window.messaging = messaging;
        window.getToken = getToken;
        window.vapidKey = vapidKey;

        // ✅ FOREGROUND NOTIFICATION HANDLER
        onMessage(messaging, (payload) => {
            console.log('🔔 Foreground Message:', payload);
            if (payload.data && payload.data.type === 'logout') {
                App.logout();
                return;
            }
            const title = payload.notification?.title || payload.data?.title || 'BellGo';
            const body = payload.notification?.body || payload.data?.body;
            new Notification(title, { body: body, icon: '/admin.png' });
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js', { scope: '/staff/' }) // ✅ FIX: Scope Isolation
                .then(() => console.log('✅ Staff Service Worker Registered'))
                .catch(err => console.log('❌ Staff SW Error:', err));
            
            navigator.serviceWorker.addEventListener('message', (event) => {
                if (event.data && event.data.type === 'logout') {
                    App.logout();
                }
            });
        }

        const savedSession = localStorage.getItem('bellgo_session');
        if (!savedSession) window.location.replace("/staff/login");
        const userData = JSON.parse(savedSession);

        // --- I18N LOGIC ---
        let translations = {};
        const t = (key) => translations[key] || key;

        async function setLanguage(lang) {
            localStorage.setItem('bellgo_lang', lang);
            try {
                const response = await fetch(`/i18n/${lang}.json`);
                translations = await response.json();
                applyTranslations();
                document.getElementById('settingsModal').style.display = 'none';
            } catch (error) { console.error(`Lang Error: ${lang}`, error); }
        }

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[key]) el.innerText = translations[key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (translations[key]) el.placeholder = translations[key];
            });
            App.handleInput(); // Update Total Text
        }

        const parseItem = (str) => {
            const parts = str.split(':');
            let name = parts[0];
            let price = 0;
            if (parts.length > 1) {
                name = parts.slice(0, -1).join(':').trim();
                price = parseFloat(parts[parts.length - 1]);
            } else { name = str.trim(); }
            return { name, price: isNaN(price) ? 0 : price };
        };

        window.UI = {
            updateBadge: (count) => {
                const b = document.getElementById('ordersBadge');
                if (count > 0) { b.style.display = 'flex'; b.innerText = count; } else { b.style.display = 'none'; }
            },
            renderOrders: (orders, mode = 'my') => {
                const list = document.getElementById('ordersList');
                const searchVal = document.getElementById('searchTable').value.trim();
                list.innerHTML = '';
                let filtered = orders;
                if (mode === 'my') { filtered = orders.filter(o => o.from === userData.name); }
                if (searchVal) { filtered = filtered.filter(o => o.text.includes(`ΤΡ: ${searchVal}`) || o.text.includes(`ΤΡ:${searchVal}`)); }
                if(filtered.length === 0) { list.innerHTML = '<div style="color:#777; text-align:center; padding:20px;">Καμία παραγγελία</div>'; return; }
                filtered.sort((a,b) => b.id - a.id);
                filtered.forEach(o => {
                    let statusTxt = '⏳ Pending'; let statusClass = 'pending';
                    if(o.status === 'cooking') { statusTxt = '🍳 Cooking'; statusClass = 'cooking'; }
                    if(o.status === 'ready') { statusTxt = '✅ Ready'; statusClass = 'ready'; }
                    const div = document.createElement('div');
                    div.className = `my-order-item ${statusClass}`;
                    
                    let total = 0;
                    const lines = o.text.split('\n');
                    let contentHtml = '';

                    lines.forEach((line, idx) => {
                        let rawLine = line.trim();
                        if (!rawLine) return;

                        const isPaidCash = rawLine.includes('✅ 💶');
                        const isPaidCard = rawLine.includes('✅ 💳');
                        const isPaid = rawLine.includes('✅');
                        const isNew = rawLine.includes('++');
                        
                        // Καθαρισμός για υπολογισμό συνόλου
                        let cleanLine = rawLine.replace(/✅ 💶|✅ 💳|✅/g, '').replace('++', '').trim();
                        let displayLine = rawLine;
                        let productName = "το προϊόν";

                        // Υπολογισμός (Μόνο αν δεν είναι εξοφλημένο)
                        if (!rawLine.startsWith('[') && !isPaid) {
                            const match = cleanLine.match(/^(\d+)\s+(.*)/);
                            if (match) {
                                let qty = parseInt(match[1]);
                                let rest = match[2];
                                if(rest.includes(':')) {
                                    const parts = rest.split(':');
                                    const valPart = parts[parts.length - 1];
                                    const priceVal = parseFloat(valPart);
                                    const nameOnly = parts.slice(0, -1).join(':').trim();
                                    productName = nameOnly;
                                    
                                    // ✅ Βελτιωμένη Εμφάνιση Κεράσματος
                                    if (valPart.includes('(KERASMA)')) {
                                        displayLine = `${qty} ${nameOnly} 🎁 (ΚΕΡΑΣΜΑ)`;
                                    } else {
                                        displayLine = `${qty} ${nameOnly} (${priceVal.toFixed(2)}€)`;
                                    }
                                    
                                    if(isNew) displayLine = "++ " + displayLine;

                                    if(!isNaN(priceVal)) { total += qty * priceVal; }
                                }
                            }
                        } else if (isPaid) {
                             // Μορφοποίηση και για τα πληρωμένα
                             const match = cleanLine.match(/^(\d+)\s+(.*)/);
                             if (match && match[2].includes(':')) {
                                const parts = match[2].split(':');
                                const priceVal = parseFloat(parts[parts.length - 1]);
                                const nameOnly = parts.slice(0, -1).join(':').trim();
                                displayLine = `${match[1]} ${nameOnly} (${priceVal.toFixed(2)}€) ✅`;
                             }
                        }

                        // Styling Γραμμής
                        let rowStyle = "display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #444; padding:4px 0;";
                        let textStyle = isPaid ? "color:#00E676; text-decoration:line-through;" : "color:#eee;";
                        if (isNew) textStyle += " color:#FFD700; font-weight:bold;";

                        // Κουμπί Μερικής Εξόφλησης (Μόνο για προϊόντα, όχι τίτλους)
                        let btnHtml = '';
                        if (!rawLine.startsWith('[') && !isPaid) {
                            // ✅ FIX: Προσθήκη επιλογών Μετρητά/Κάρτα όπως στο Admin
                            const opCash = isPaidCard ? '0.3' : '1';
                            const opCard = isPaidCash ? '0.3' : '1';
                            const filtCash = isPaidCard ? 'grayscale(1)' : 'none';
                            const filtCard = isPaidCash ? 'grayscale(1)' : 'none';
                            
                            btnHtml = `
                                <button onclick="event.stopPropagation(); App.payItemPartial(${o.id}, ${idx}, 'cash')" style="background:transparent; border:none; cursor:pointer; font-size:18px; margin-left:5px; opacity:${opCash}; filter:${filtCash};" title="Μετρητά">💶</button>
                                <button onclick="event.stopPropagation(); App.payItemPartial(${o.id}, ${idx}, 'card')" style="background:transparent; border:none; cursor:pointer; font-size:18px; margin-left:5px; opacity:${opCard}; filter:${filtCard};" title="Κάρτα">💳</button>
                            `;
                        } else if (isPaid) {
                             // Αν είναι πληρωμένο, δείχνουμε τα κουμπιά αχνά για να φαίνεται ο τρόπος
                             const opCash = isPaidCash ? '1' : '0.3';
                             const opCard = isPaidCard ? '1' : '0.3';
                             const filtCash = isPaidCash ? 'none' : 'grayscale(1)';
                             const filtCard = isPaidCard ? 'none' : 'grayscale(1)';
                             
                             btnHtml = `
                                <button onclick="event.stopPropagation(); App.payItemPartial(${o.id}, ${idx}, 'cash')" style="background:transparent; border:none; cursor:pointer; font-size:18px; margin-left:5px; opacity:${opCash}; filter:${filtCash};">💶</button>
                                <button onclick="event.stopPropagation(); App.payItemPartial(${o.id}, ${idx}, 'card')" style="background:transparent; border:none; cursor:pointer; font-size:18px; margin-left:5px; opacity:${opCard}; filter:${filtCard};">💳</button>
                            `;
                        }

                        contentHtml += `<div style="${rowStyle}"><span style="${textStyle}">${displayLine}</span>${btnHtml}</div>`;
                    });

                    div.innerHTML = `

                    `;

            filterOrders: () => {
                const mode = document.getElementById('tabMyOrders').classList.contains('active') ? 'my' : 'all';
                UI.renderOrders(App.allActiveOrders, mode);
            }
        };

        window.App = {
            allActiveOrders: [],
            allReservations: [], // ✅ NEW
            selectedOrderId: null,
            updatingOrderId: null,
            staffChargeMode: false, // ✅ NEW
            payMethod: 'cash',
            isChatOpen: false,
            features: {}, // ✅ NEW: Local Features
            
            // EXTRAS LOGIC
            menuData: [],
            currentItem: null,
            tempSelectedExtras: [],

            // ✅ NEW: Check Reservations Logic
            checkUpcomingReservations: () => {
                const list = App.allReservations || [];
                const now = new Date();
                const oneHourLater = new Date(now.getTime() + 60 * 60 * 1000);
                
                let count = 0;
                list.forEach(r => {
                    if(r.status === 'cancelled') return;
                    try {
                        // Format assumption: date="YYYY-MM-DD", time="HH:MM"
                        const d = new Date(r.date + 'T' + r.time);
                        // Check if valid and within next hour (and not in past)
                        if(d > now && d <= oneHourLater) {
                            count++;
                        }
                    } catch(e){}
                });
                
                const wrapper = document.getElementById('resWrapper');
                const badge = document.getElementById('resBadge');
                
                if(count > 0) {
                    wrapper.style.display = 'flex';
                    badge.style.display = 'flex';
                    badge.innerText = count;
                } else {
                    wrapper.style.display = 'none';
                }
            },

            openReservations: () => {
                const modal = document.getElementById('staffReservationsModal');
                const listDiv = document.getElementById('resList');
                listDiv.innerHTML = '';
                
                const now = new Date();
                const oneHourLater = new Date(now.getTime() + 60 * 60 * 1000);
                
                const upcoming = App.allReservations.filter(r => {
                    if(r.status === 'cancelled') return false;
                    try { const d = new Date(r.date + 'T' + r.time); return d > now && d <= oneHourLater; } catch(e){return false;}
                });
                
                if(upcoming.length === 0) listDiv.innerHTML = '<div style="text-align:center; color:#aaa;">Καμία κράτηση την επόμενη ώρα.</div>';
                
                upcoming.forEach(r => {
                    const div = document.createElement('div');
                    div.style.cssText = "background:#222; padding:10px; border-radius:8px; border:1px solid #444;";
                    div.innerHTML = `<div style="color:#FFD700; font-weight:bold;">${r.time} - ${r.name}</div><div style="color:white;">${r.pax || '?'} Άτομα • ${r.phone || ''}</div>${r.notes ? `<div style="color:#aaa; font-size:12px; margin-top:5px;">📝 ${r.notes}</div>` : ''}`;
                    listDiv.appendChild(div);
                });
                modal.style.display = 'flex';
            },

            init: () => {
                document.getElementById('headerName').innerText = userData.name;
                document.getElementById('headerStore').innerText = userData.store;

                // ✅ NEW: Load Features & Enforce Subscription
                if (userData.features) {
                    App.features = { ...userData.features };
                }

                App.connectSocket(); // ✅ Connect first

                // Έλεγχος αν υπάρχει έστω μία συνδρομή (αλλιώς Overlay)
                Sundromes.checkSubscriptionAndEnforce({ ...userData, features: App.features });
                
                App.applyFeatureVisibility(); // ✅ Εφαρμογή ορατότητας
                
                document.addEventListener('keydown', (e) => {
                    if (['AudioVolumeUp', 'AudioVolumeDown'].includes(e.code) || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                        if(window.AudioEngine && window.AudioEngine.isRinging) {
                            App.acceptAlarmStaff();
                        }
                    }
                });
                
                // 🔹 SIMPLIFIED WRITING MODE & VISUAL VIEWPORT (Web & Mobile Fix)
                const txt = document.getElementById('inpOrderText');
                const panel = document.getElementById('orderPanel');

                function handleViewport() {
                    if (window.visualViewport) {
                        document.documentElement.style.setProperty('--app-height', `${window.visualViewport.height}px`);
                        if (window.visualViewport.height > (window.screen.height * 0.8)) {
                            // Keyboard Closed
                            panel.classList.remove('writing-mode');
                            txt.blur();
                        }
                    }
                }
                
                if (window.visualViewport) {
                    window.visualViewport.addEventListener('resize', handleViewport);
                    window.visualViewport.addEventListener('scroll', handleViewport);
                }
                window.addEventListener('resize', handleViewport);
                
                txt.addEventListener('focus', () => {
                    panel.classList.add('writing-mode');
                });
                
                txt.addEventListener('blur', () => {
                      // Using setTimeout to allow click events
                      setTimeout(() => {
                          panel.classList.remove('writing-mode');
                      }, 150);
                });

                App.startHeartbeat();
                App.checkNotificationPermission();

                // ✅ NEW: Detect Background/Foreground State
                document.addEventListener('visibilitychange', () => {
                    if (window.socket && window.socket.connected) {
                        window.socket.emit('set-user-status', document.hidden ? 'background' : 'online');
                    }
                });

                // Load Language
                const savedLang = localStorage.getItem('bellgo_lang') || 'el';
                setLanguage(savedLang);
                setInterval(() => App.checkUpcomingReservations(), 60000); // Check every minute
            },

            // ✅ NEW: Apply Visibility based on Features (Staff Logic)
            applyFeatureVisibility: () => {
                const hasChat = App.hasFeature('pack_chat');
                // Η παραγγελιοληψία απαιτεί Manager, Delivery ή Tables
                const hasOrdering = App.hasFeature('pack_manager') || App.hasFeature('pack_delivery') || App.hasFeature('pack_tables');

                // 1. Ordering UI (Waiter Panel & My Orders)
                const waiterPanel = document.getElementById('waiterPanel');
                const myOrdersBtn = document.querySelector('button[onclick="App.toggleMyOrders()"]');
                
                if (waiterPanel) waiterPanel.style.display = hasOrdering ? 'block' : 'none';
                if (myOrdersBtn) myOrdersBtn.style.display = hasOrdering ? 'flex' : 'none';

                // ✅ NEW: Payment Method Toggle (Visible if Ordering is active)
                const payToggle = document.querySelector('.pay-method-toggle');
                if (payToggle) {
                    payToggle.style.display = hasOrdering ? 'flex' : 'none';
                }

                // 2. Chat & Bell (Pack 1)
                const chatWrapper = document.querySelector('button[onclick="App.toggleChat()"]')?.parentElement;
                const bellBtn = document.getElementById('staffBellBtn');
                
                if (chatWrapper) chatWrapper.style.display = hasChat ? 'flex' : 'none';
                if (bellBtn) bellBtn.style.display = hasChat ? 'flex' : 'none';
                if (bellBtn && !hasChat) {
                    bellBtn.style.display = 'none';
                }
                
                // 3. Fake Lock (Available in Chat or Ordering)
                const fakeLockBtn = document.querySelector('button[title="Black Screen"]');
                if (fakeLockBtn) fakeLockBtn.style.display = (hasChat || hasOrdering) ? 'flex' : 'none';
            },
            
            hasFeature: (key) => {
                const userContext = { ...userData, features: { ...userData.features, ...App.features } };
                return Sundromes.hasAccess(userContext, key);
            },

            checkNotificationPermission: () => {
                if (Notification.permission === 'default') {
                    const div = document.createElement('div');
                    div.id = 'notifPermRequest';
                    div.style.cssText = "position:fixed; bottom:0; left:0; width:100%; background:#222; border-top:2px solid #FFD700; padding:20px; z-index:10000; text-align:center; box-shadow:0 -5px 20px rgba(0,0,0,0.5);";
                    div.innerHTML = `
                        <div style="color:white; font-weight:bold; margin-bottom:10px; font-size:16px;">🔔 Ενεργοποίηση Ειδοποιήσεων</div>
                        <div style="color:#ccc; font-size:12px; margin-bottom:15px;">Για να λαμβάνετε ειδοποιήσεις για νέες παραγγελίες και κλήσεις.</div>
                        <button id="btnAllowNotif" style="background:#00E676; color:black; border:none; padding:10px 25px; border-radius:20px; font-weight:bold; font-size:14px; cursor:pointer;">ΕΝΕΡΓΟΠΟΙΗΣΗ</button>
                        <button onclick="document.getElementById('notifPermRequest').remove()" style="background:none; border:none; color:#777; margin-left:10px; cursor:pointer;">Όχι τώρα</button>
                    `;
                    document.body.appendChild(div);
                    
                    document.getElementById('btnAllowNotif').onclick = async () => {
                        await App.requestNotifyPermission();
                        document.getElementById('notifPermRequest').remove();
                    };
                } else if (Notification.permission === 'granted') {
                    App.requestNotifyPermission();
                }
            },

            requestNotifyPermission: async () => {
                try {
                    // ✅ FIX: Δημιουργία Καναλιού για Android (Capacitor/APK)
                    if (window.Capacitor?.Plugins?.PushNotifications) {
                        const PushNotifications = window.Capacitor.Plugins.PushNotifications;
                        await PushNotifications.createChannel({ id: 'bellgo_alarm_channel', name: 'BellGo Urgent', importance: 5, visibility: 1, sound: 'alert_sound', vibration: true });
                        await PushNotifications.requestPermissions();
                        await PushNotifications.register();
                    }

                    const permission = await Notification.requestPermission();
                    if (permission === "granted") {
                        const registration = await navigator.serviceWorker.ready;
                        const token = await getToken(messaging, { 
                            vapidKey: vapidKey, 
                            serviceWorkerRegistration: registration 
                        }); 
                        if (token) {
                            localStorage.setItem('fcm_token', token);
                            if(window.socket && window.socket.connected) {
                                window.socket.emit('update-token', { token: token, username: userData.name });
                            }
                        }
                    }
                } catch (e) { console.error(e); }
            },

            unlockAudio: () => {
                if(window.AudioEngine) window.AudioEngine.init();
                document.getElementById('startScreen').style.display = 'none';
            },

            connectSocket: () => {
                window.socket = io({ transports: ['polling', 'websocket'], reconnection: true });
                const socket = window.socket;

                socket.on('connect', () => {
                    document.getElementById('connDot').style.background = '#00E676';
                    // ✅ NEW: Send Status Immediately on Connect
                    socket.emit('set-user-status', document.hidden ? 'background' : 'online');

                    socket.emit('join-store', { 
                        storeName: userData.store, 
                        username: userData.name, 
                        role: userData.role, 
                        token: localStorage.getItem('fcm_token'), 
                        isNative: !!window.Capacitor
                    });
                });

                socket.on('reservations-update', (data) => {
                    App.allReservations = data || [];
                    App.checkUpcomingReservations();
                });

                socket.on('ring-bell', (data) => {
                    if(window.AudioEngine) window.AudioEngine.triggerAlarm(data ? data.source : null);
                    const bell = document.getElementById('staffBellBtn');
                    bell.style.display = 'flex';
                    // ✅ Εμφάνιση ποιος καλεί (Ταμείο ή Κουζίνα)
                    if(data && data.source) bell.innerText = `🔔 ${data.source}`; else bell.innerText = "🔔";
                    bell.classList.add('ringing');
                    // No Overlay
                });

                socket.on('store-settings-update', (settings) => {
                    if(settings) {
                        App.staffChargeMode = settings.staffCharge || false; // ✅ Update local state
                        if(settings.features) {
                            App.features = settings.features;
                            // ✅ Re-check subscription (Real-time unlock)
                            Sundromes.checkSubscriptionAndEnforce({ ...userData, features: App.features });
                            App.applyFeatureVisibility(); // ✅ Update UI dynamically
                        }
                        const closedOverlay = document.getElementById('closedOverlay');
                        const btnSend = document.getElementById('btnSendOrder');
                        if(settings.statusStaff === false) {
                            closedOverlay.style.display = 'flex';
                            if(btnSend) { btnSend.disabled = true; btnSend.innerText = t('store_closed') || "⛔ ΚΛΕΙΣΤΟ"; }
                        } else {
                            closedOverlay.style.display = 'none';
                            if(btnSend) { btnSend.disabled = false; btnSend.innerText = t('send_order') || "ΑΠΟΣΤΟΛΗ 🚀"; }
                        }
                    }
                });

                socket.on('disconnect', () => { document.getElementById('connDot').style.background = 'red'; });
                
                socket.on('menu-update', (data) => {
                    const container = document.getElementById('menuContainer');
                    container.innerHTML = '';
                    let menu = [];
                    try {
                        if(typeof data === 'string' && data.startsWith('[')) { menu = JSON.parse(data); } 
                        else if (typeof data === 'object') { menu = data; } 
                        else { const items = (data || "ΜΕΝΟΥ").split('\n'); menu = [{ name: "ΓΕΝΙΚΑ", items: items }]; }
                    } catch(e) { menu = []; }

                    const isIos = () => {
                        const ua = window.navigator.userAgent.toLowerCase();
                        return /iphone|ipad|ipod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1) || (ua.includes("mac") && "ontouchend" in document);
                    };

                    if(Array.isArray(menu)) {
                        menu.sort((a,b) => (a.order || 99) - (b.order || 99));
                        menu.forEach(cat => {
                            const title = document.createElement('div');
                            title.className = 'category-title';
                            title.innerText = cat.name;
                            const itemsDiv = document.createElement('div');
                            itemsDiv.className = 'category-items';
                            cat.items.forEach(item => {
                                let itemName = "", itemPrice = 0, itemExtras = [];
                                if (typeof item === 'string') {
                                    const parts = item.split(':');
                                    itemName = parts[0].trim();
                                    if(parts.length > 1) itemPrice = parseFloat(parts[parts.length-1]) || 0;
                                } else {
                                    itemName = item.name;
                                    itemPrice = item.price;
                                    itemExtras = item.extras || [];
                                }

                                if(itemName) {
                                    const box = document.createElement('div');
                                    box.className = 'item-box';
                                    box.innerHTML = `<span class="item-name">${itemName}</span>${itemPrice > 0 ? `<span class="item-price">${itemPrice}€</span>` : ''}`;
                                    
                                    let lastTap = 0;
                                    box.addEventListener('click', (e) => {
                                        e.preventDefault();
                                        
                                        // On iPhone, Double Tap is hard, so we use Single Tap
                                        if (isIos()) {
                                            App.handleItemClick(itemName, itemPrice, itemExtras);
                                            box.style.opacity = '0.5';
                                            setTimeout(() => box.style.opacity = '1', 100);
                                            return;
                                        }

                                        const currentTime = new Date().getTime();
                                        const tapLength = currentTime - lastTap;
                                        if (tapLength < 500 && tapLength > 0) {
                                            App.handleItemClick(itemName, itemPrice, itemExtras);
                                            lastTap = 0;
                                            box.style.opacity = '0.5';
                                            setTimeout(() => box.style.opacity = '1', 100);
                                        } else {
                                            lastTap = currentTime;
                                        }
                                    });
                                    itemsDiv.appendChild(box);
                                }
                            });
                            const wrapper = document.createElement('div');
                            wrapper.className = 'category-block';
                            wrapper.appendChild(title);
                            wrapper.appendChild(itemsDiv);
                            container.appendChild(wrapper);
                        });
                    }
                });

                socket.on('chat-message', (data) => App.appendChat(data));
                socket.on('orders-update', (orders) => {
                    App.allActiveOrders = orders;
                    const myCount = orders.filter(o => o.from === userData.name).length;
                    UI.updateBadge(myCount);
                    if(document.getElementById('myOrdersOverlay').style.display === 'flex') UI.filterOrders();
                });
            },

            // --- MENU INTERACTION ---
            handleItemClick: (name, price, extras) => {
                if (!extras || extras.length === 0) {
                    App.addToOrder(name, price);
                } else {
                    App.currentItem = { name, price };
                    App.tempSelectedExtras = [];
                    const list = document.getElementById('userExtrasList');
                    list.innerHTML = '';
                    document.getElementById('userExtrasTitle').innerText = name;
                    
                    extras.forEach((ex, idx) => {
                        const btn = document.createElement('div');
                        btn.className = 'extra-option';
                        btn.innerHTML = `<span>${ex.name}</span><span>${ex.price > 0 ? `+${ex.price}€` : ''}</span>`;
                        btn.onclick = () => {
                            if (btn.classList.contains('selected')) {
                                btn.classList.remove('selected');
                                App.tempSelectedExtras = App.tempSelectedExtras.filter(e => e.name !== ex.name);
                            } else {
                                btn.classList.add('selected');
                                App.tempSelectedExtras.push(ex);
                            }
                        };
                        list.appendChild(btn);
                    });
                    document.getElementById('userExtrasModal').style.display = 'flex';
                }
            },
            
            confirmExtras: () => {
                if (!App.currentItem) return;
                App.addToOrder(App.currentItem.name, App.currentItem.price);
                App.tempSelectedExtras.forEach(ex => {
                     App.addToOrder(`  + ${ex.name}`, ex.price);
                });
                document.getElementById('userExtrasModal').style.display = 'none';
            },

            addToOrder: (item, price = 0) => {
                const txt = document.getElementById('inpOrderText');
                txt.classList.add('flash'); setTimeout(() => txt.classList.remove('flash'), 200);
                
                const entry = price > 0 ? `${item}:${price}` : item;
                
                if (txt.value.trim() === '') txt.value = `1 ${entry}`;
                else txt.value += `\n1 ${entry}`;
                
                txt.scrollTop = txt.scrollHeight;
                App.handleInput(); 
                
                const panel = document.getElementById('orderPanel');
                if (panel.classList.contains('minimized')) {
                    App.toggleOrderPanel();
                }
            },

            toggleOrderPanel: () => {
                const p = document.getElementById('orderPanel');
                const icon = document.getElementById('panelIcon');
                if(p.classList.contains('minimized')) {
                    p.classList.remove('minimized');
                    icon.style.transform = 'rotate(0deg)';
                    icon.innerText = '▼';
                } else {
                    p.classList.add('minimized');
                    icon.style.transform = 'rotate(180deg)';
                    icon.innerText = '▲';
                }
            },

            handleInput: () => {
                const text = document.getElementById('inpOrderText').value.trim();
                const lines = text.split('\n');
                let total = 0;
                
                for (const line of lines) {
                    if (!line.trim()) continue;
                    let qty = 1; let rest = line;
                    const qtyMatch = line.match(/^(\d+)\s+(.*)/);
                    if(qtyMatch) { qty = parseInt(qtyMatch[1]); rest = qtyMatch[2]; }

                    if(rest.includes(':')) {
                        const parts = rest.split(':');
                        const priceVal = parseFloat(parts[parts.length-1]);
                        if(!isNaN(priceVal)) { total += qty * priceVal; } 
                    }
                }
                document.getElementById('liveTotal').innerText = `${t('total') || 'ΣΥΝΟΛΟ'}: ${total.toFixed(2)}€`;
            },

            // ✅ Bridge for player.js compatibility
            acceptAlarm: function() { this.acceptAlarmStaff(); },

            acceptAlarmStaff: () => {
                if(window.AudioEngine) window.AudioEngine.stopAlarm();
                const bell = document.getElementById('staffBellBtn');
                bell.style.display = 'none';
                bell.classList.remove('ringing');
                window.socket.emit('alarm-accepted', { store: userData.store, username: userData.name });
            },

            sendOrder: () => {
                const txt = document.getElementById('inpOrderText').value;
                const tbl = document.getElementById('inpTable').value;
                const payIcon = App.payMethod === 'card' ? '💳' : '💵';
                const cv = document.getElementById('inpCovers').value;
                
                if (App.updatingOrderId) {
                     // ✅ FIX: Χρήση add-items για ++ και Alarm στον Admin

                     alert("Προστέθηκαν! ➕");
                     App.cancelUpdate();
                     return;
                }
                if(!txt) return alert("Κενή παραγγελία");
                const header = `[ΤΡ: ${tbl||'-'} | AT: ${cv||'-'} | ${payIcon}]`;
                window.socket.emit('new-order', `${header}\n${txt}`);
                document.getElementById('inpTable').value = '';
                document.getElementById('inpCovers').value = '';
                document.getElementById('inpOrderText').value = '';
                document.getElementById('liveTotal').innerText = `${t('total') || 'ΣΥΝΟΛΟ'}: 0.00€`;
                App.setPayment('cash');
                alert("Εστάλη!");
            },
            
            setPayment: (m) => { App.payMethod=m; document.getElementById('btnCash').className=m==='cash'?'pay-btn active':'pay-btn'; document.getElementById('btnCard').className=m==='card'?'pay-btn active':'pay-btn'; },
            cancelUpdate: () => { App.updatingOrderId=null; document.getElementById('btnSendOrder').innerText=t('send_order')||"ΑΠΟΣΤΟΛΗ 🚀"; document.getElementById('btnSendOrder').classList.remove('update-mode'); document.getElementById('cancelUpdateBtn').style.display='none'; document.getElementById('inpTable').value=''; document.getElementById('inpCovers').value=''; document.getElementById('inpOrderText').value=''; },
            prepareUpdateOrder: () => { 
                document.getElementById('actionModal').style.display='none'; document.getElementById('myOrdersOverlay').style.display='none';
                const o = App.allActiveOrders.find(x=>x.id===App.selectedOrderId); if(!o)return;
                App.updatingOrderId=o.id; 
                const t=o.text.match(/ΤΡ:\s*(\d+)/); if(t)document.getElementById('inpTable').value=t[1];
                const c=o.text.match(/AT:\s*(\d+)/); if(c)document.getElementById('inpCovers').value=c[1];
                const btn=document.getElementById('btnSendOrder'); btn.innerText=t('update_order')||"➕ ΕΝΗΜΕΡΩΣΗ"; btn.classList.add('update-mode');
                document.getElementById('cancelUpdateBtn').style.display='block';
                const p = document.getElementById('orderPanel');
                if(p.classList.contains('minimized')) App.toggleOrderPanel();
            },
            
            // --- TREAT LOGIC ---
            openTreatModal: () => {
                document.getElementById('actionModal').style.display = 'none';
                const o = App.allActiveOrders.find(x => x.id === App.selectedOrderId);
                if (!o) return;
                
                const list = document.getElementById('treatItemsList');
                list.innerHTML = '';
                
                const lines = o.text.split('\n');
                lines.forEach((line, idx) => {
                    if (!line.trim() || line.startsWith('[')) return;
                    // Show only items with price > 0
                    if (line.includes(':') && !line.includes(':0')) {
                        const btn = document.createElement('button');
                        btn.className = 'btn-act';
                        btn.style.cssText = "background:#333; color:white; font-size:14px; padding:10px; text-align:left; border:1px solid #555;";
                        btn.innerText = line;
                        btn.onclick = () => {
                            if(confirm("Κέρασμα για: " + line + ";")) {
                                window.socket.emit('treat-order', { id: App.selectedOrderId, type: 'partial', index: idx });
                                document.getElementById('treatModal').style.display = 'none';
                            }
                        };
                        list.appendChild(btn);
                    }
                });
                
                document.getElementById('treatModal').style.display = 'flex';
            },
            treatFullOrder: () => { if(confirm("Κέρασμα ΟΛΗ την παραγγελία;")) { window.socket.emit('treat-order', { id: App.selectedOrderId, type: 'full' }); document.getElementById('treatModal').style.display = 'none'; } },

            // ✅ NEW: QR PAYMENT LOGIC (STAFF)
            // ✅ NEW: PARTIAL PAYMENT (Cash/Card)
            payItemPartial: (id, index, method) => {
                window.socket.emit('pay-partial', { id: id, index: index, method: method });
            },

            openQrPayment: async () => {
                document.getElementById('actionModal').style.display = 'none';
                const order = App.allActiveOrders.find(o => o.id == App.selectedOrderId);
                if(!order) return;
                
                // Calculate total from text
                const total = calculateOrderTotal(order.text);
                if(total <= 0) return alert("Το ποσό είναι μηδενικό.");

                try {
                    const res = await fetch('/create-qr-payment', {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ amount: total, storeName: userData.store, orderId: order.id })
                    });
                    const data = await res.json();
                    if(data.url) {
                        document.getElementById('qrPaymentCode').innerHTML = "";
                        new QRCode(document.getElementById('qrPaymentCode'), { text: data.url, width: 200, height: 200 });
                        
                        // ✅ Προσθήκη κουμπιού για άνοιγμα στη συσκευή του προσωπικού
                        const linkContainer = document.getElementById('qrLinkContainerStaff');
                        if(linkContainer) {
                            linkContainer.innerHTML = `<button onclick="window.open('${data.url}', '_blank')" style="background:#2196F3; color:white; border:none; padding:10px; border-radius:6px; cursor:pointer; width:100%; font-weight:bold;">🔗 ΠΛΗΡΩΜΗ ΕΔΩ (MANUAL)</button>`;
                        }

                        document.getElementById('qrPaymentModal').style.display = 'flex';
                    } else { alert("Σφάλμα: " + (data.error || "Άγνωστο")); }
                } catch(e) { alert("Σφάλμα σύνδεσης."); }
            },

            // ✅ NEW: PRINT ORDER (STAFF)
            printOrder: () => {
                document.getElementById('actionModal').style.display = 'none';
                const order = App.allActiveOrders.find(o => o.id == App.selectedOrderId);
                if(!order) return;
                
                const total = calculateOrderTotal(order.text);
                const date = new Date(order.id).toLocaleString('el-GR');
                const storeName = userData.store || "BellGo Order";
                const itemsHtml = order.text.replace(/\n/g, '<br>');

                const win = window.open('', '', 'width=300,height=600');
                win.document.write(`
                    <html><head><title>Print</title><style>
                        body { font-family: 'Courier New', monospace; width: 280px; margin: 0 auto; padding: 10px; color: black; }
                        .header { text-align: center; font-weight: bold; border-bottom: 1px dashed #000; padding-bottom: 5px; margin-bottom: 10px;}
                        .items { font-size: 14px; font-weight: bold; border-bottom: 1px dashed #000; padding-bottom: 10px; margin-bottom: 10px; }
                        .total { text-align: right; font-size: 18px; font-weight: bold; }
                    </style></head><body>
                        <div class="header">${storeName}<br>${date}<br>${order.from}</div>
                        <div class="items">${itemsHtml}</div>
                        <div class="total">TOTAL: ${total.toFixed(2)}€</div>
                        <script>window.onload = function() { window.print(); setTimeout(function(){ window.close(); }, 500); }<\/script>
                    </body></html>`);
            },

            handlePayOrder: () => { 
                document.getElementById('actionModal').style.display='none'; 
                
                if (App.staffChargeMode) {
                    // ✅ NEW: Staff Charge Logic
                    const order = App.allActiveOrders.find(o => o.id == App.selectedOrderId);
                    const total = calculateOrderTotal(order.text);
                    
                    if(confirm(`💰 Χρέωση ${total.toFixed(2)}€ σε εσένα (Μετρητά); \n\n(Πατήστε Cancel για Κάρτα/Απλό Κλείσιμο)`)) {
                        // Χρέωση στον σερβιτόρο
                        window.socket.emit('charge-order-to-staff', { orderId: App.selectedOrderId, staffName: userData.name, amount: total, method: 'cash' });
                    } else {
                        // Κάρτα ή Απλό κλείσιμο (δεν χρεώνεται ο σερβιτόρος)
                        if(confirm("Κλείσιμο ως Κάρτα/Τράπεζα;")) {
                            window.socket.emit('charge-order-to-staff', { orderId: App.selectedOrderId, staffName: userData.name, amount: total, method: 'card' });
                        }
                    }
                } else {
                    // Old Logic
                    if(confirm("Εξόφληση;")) window.socket.emit('pay-order', App.selectedOrderId); 
                }
            },
            toggleMyOrders: () => { const el=document.getElementById('myOrdersOverlay'); if(el.style.display==='flex')el.style.display='none'; else { el.style.display='flex'; UI.filterOrders(); } },
            switchTab: (m) => { document.getElementById('tabMyOrders').className=m==='my'?'tab-btn active':'tab-btn'; document.getElementById('tabAllOrders').className=m==='all'?'tab-btn active':'tab-btn'; UI.filterOrders(); },
            toggleChat: () => { const el=document.getElementById('staffChatOverlay'); App.isChatOpen=(el.style.display==='flex'); if(App.isChatOpen){el.style.display='none';App.isChatOpen=false;}else{el.style.display='flex';App.isChatOpen=true;document.getElementById('chatBadge').style.display='none';} },
            sendChat: () => { const inp=document.getElementById('waiterChatInp'); if(inp.value.trim()){window.socket.emit('chat-message',{text:inp.value});inp.value='';} },
            appendChat: (d) => { if(d.sender!==userData.name && !App.isChatOpen)document.getElementById('chatBadge').style.display='block'; const b=document.getElementById('waiterChatBox'); if(b){b.innerHTML+=`<div class="chat-msg ${d.sender===userData.name?'me':'other'}"><b>${d.sender}:</b> ${d.text}</div>`;b.scrollTop=b.scrollHeight;} },
            toggleFakeLock: () => { 
                const el=document.getElementById('fakeLockOverlay'); 
                const isLocked = (el.style.display !== 'flex');
                el.style.display = isLocked ? 'flex' : 'none';
                // ✅ Αν κλειδώσει, δηλώνουμε background για να έρχονται ειδοποιήσεις
                if(window.socket) window.socket.emit('set-user-status', isLocked ? 'background' : 'online');
            },
            logout: () => { window.socket.emit('manual-logout'); localStorage.removeItem('bellgo_session'); window.location.replace("/staff/login"); },
            startHeartbeat: () => setInterval(() => { if(window.socket?.connected) window.socket.emit('heartbeat'); }, 3000)
        };
        window.onload = App.init;
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js', { scope: '/staff/' }) // ✅ FIX: Scope Isolation
                .then(() => console.log('✅ Staff Service Worker Registered'))
                .catch(err => console.log('❌ Staff SW Error:', err));
        }
    </script>
    <script src="player.js"></script>
    <script src="keepalive.js"></script>
</body>
</html>
