<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BellGo Είσοδος</title>
    
    <link rel="manifest" id="dynamicManifest" href="/manifest.json?icon=admin">
    
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="admin.png">
    
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const pStore = params.get('store');
            const manifestLink = document.getElementById('dynamicManifest');
            let url = `/manifest.json?icon=admin`; 
            if (pStore) url += `&store=${pStore}`;
            manifestLink.href = url;
        })();
    </script>
    
    <script src="https://js.stripe.com/v3/"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #121212; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; min-height: 100dvh; margin: 0; overflow-y: auto; padding: 20px 0; }
        
        .login-container { width: 90%; max-width: 400px; background: #1e1e1e; padding: 30px; border-radius: 12px; border: 1px solid #333; text-align: center; position: relative; margin: auto; }
        h1 { color: #FFD700; margin-bottom: 20px; font-size: 28px; }
        
        #btnInstall { display: none; margin-bottom: 15px; background: #00E676; color: black; padding: 12px; border-radius: 8px; border: none; font-weight: bold; width: 100%; cursor: pointer; animation: pulse 2s infinite; font-size: 14px; }
        
        .form-section { display: none; flex-direction: column; gap: 15px; }
        .form-section.active { display: flex; }

        .inp { padding: 12px; border-radius: 6px; border: 1px solid #444; background: #2a2a2a; color: white; font-size: 16px; width: 100%; box-sizing: border-box; text-align: center; }
        
        .btn-main { padding: 14px; border-radius: 6px; border: none; background: #FFD700; color: black; font-weight: bold; font-size: 18px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-google { background: #DB4437; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .btn-price { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #444; background: #333; color: white; cursor: pointer; font-size: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-price:hover { background: #444; }
        .price-tag { font-size: 18px; font-weight: bold; color: #FFD700; }
        
        .divider { display: flex; align-items: center; text-align: center; color: #555; margin: 10px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #333; }
        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }

        #pinModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; flex-direction: column; }
        .pin-box { background: #222; padding: 25px; border-radius: 10px; border: 2px solid #FFD700; text-align: center; width: 80%; max-width: 300px; }
        .pin-display { font-size: 30px; letter-spacing: 10px; margin: 20px 0; font-weight: bold; color: #00E676; min-height: 40px; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .num-btn { padding: 15px; background: #333; border: 1px solid #555; color: white; font-size: 20px; border-radius: 8px; cursor: pointer; }
        .num-btn:active { background: #555; }
        .forgot-link { margin-top: 15px; color: #aaa; text-decoration: underline; font-size: 12px; cursor: pointer; background: none; border: none; display: none; }

        /* NEW ROLE GRID */
        .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .btn-role { padding: 20px 10px; background: #2a2a2a; border: 1px solid #444; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; font-size: 14px; transition: 0.2s; }
        .btn-role:active { transform: scale(0.95); background: #333; border-color: #FFD700; }
        .role-icon { font-size: 24px; margin-bottom: 5px; }
        
        .btn-sub-link { background: none; border: none; color: #555; text-decoration: underline; font-size: 12px; cursor: pointer; margin-top: 10px; }
        .btn-back { background: transparent; border: 1px solid #555; color: #aaa; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 14px; margin-top: 15px; width: 100%; }

        .password-wrapper { position: relative; width: 100%; }
        .password-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #aaa; font-size: 18px; background:none; border:none; padding: 0; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="login-container">
        <h1 onclick="window.dc=(window.dc||0)+1; if(window.dc===5) { const p = prompt('Developer Password:'); if(p === '19921992') window.location.href='developer.html'; window.dc=0; }" style="cursor:pointer; user-select:none;">BellGo 🔔</h1>
        
        <div style="display:flex; justify-content:center; gap:10px; margin-bottom:15px;">
            <button onclick="setLanguage('el')" style="background:none; border:1px solid #555; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">🇬🇷 ΕΛ</button>
            <button onclick="setLanguage('en')" style="background:none; border:1px solid #555; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">🇺🇸 EN</button>
        </div>

        <button id="btnInstall" onclick="handleInstall()" data-i18n="install_app">📲 ΕΓΚΑΤΑΣΤΑΣΗ ΕΦΑΡΜΟΓΗΣ</button>
        
        <!-- 1. ROLE SELECTION SCREEN -->
        <div id="roleSelection" class="form-section active">
            <p style="color:#aaa; margin-bottom:15px;" data-i18n="select_role">Επιλέξτε τον ρόλο σας:</p>
            <div class="role-grid">
                <button class="btn-role" onclick="UI.showAdminLogin('cashier')">
                    <span class="role-icon">🏪</span> <span data-i18n="cashier">ΤΑΜΕΙΟ</span>
                </button>
                <button class="btn-role" onclick="UI.showAdminLogin('kitchen')">
                    <span class="role-icon">👨‍🍳</span> <span data-i18n="kitchen">ΚΟΥΖΙΝΑ</span>
                </button>
                <button class="btn-role" onclick="UI.showStaffLogin('waiter')">
                    <span class="role-icon">🤵</span> <span data-i18n="waiter">ΣΕΡΒΙΤΟΡΟΣ</span>
                </button>
                <button class="btn-role" onclick="UI.showStaffLogin('driver')">
                    <span class="role-icon">🛵</span> <span data-i18n="driver">ΔΙΑΝΟΜΕΑΣ</span>
                </button>
            </div>
        </div>

        <!-- 2. STAFF LOGIN FORM -->
        <div id="staffForm" class="form-section">
            <h3 style="color:#FFD700; margin:0;" data-i18n="staff_login">Είσοδος Προσωπικού</h3>
            <input type="text" id="stStore" class="inp" placeholder="Email Επιχείρησης (Admin Email)" data-i18n-placeholder="placeholder_admin_email">
            <input type="text" id="stName" class="inp" placeholder="Το Όνομά σου" data-i18n-placeholder="placeholder_your_name">
            <div class="password-wrapper">
                <input type="password" id="stPin" class="inp" placeholder="Κωδικός Καταστήματος (PIN)" inputmode="numeric" data-i18n-placeholder="placeholder_pin">
                <button class="password-toggle" onclick="UI.togglePinVisibility()" type="button">👁️</button>
            </div>
            <!-- Hidden Select, controlled by JS -->
            <select id="stRole" class="inp" style="display:none;">
                <option value="waiter">Σερβιτόρος 🤵</option>
                <option value="driver">Διανομέας 🛵</option>
            </select>
            <button class="btn-main" id="btnStaffLogin" onclick="Staff.login()" data-i18n="login_btn">ΕΙΣΟΔΟΣ</button>
            <button class="btn-back" onclick="UI.showRoles()" data-i18n="back_btn">🔙 ΠΙΣΩ</button>
        </div>

        <!-- 3. ADMIN LOGIN FORM -->
        <div id="adminForm" class="form-section">
            <h3 style="color:#FFD700; margin:0;" data-i18n="admin_management">Διαχείριση (Admin)</h3>
            <input type="email" id="adminEmailInp" class="inp" placeholder="Email (για είσοδο ή αγορά)" data-i18n-placeholder="placeholder_email_login_buy">
            <input type="text" id="adminNameInp" class="inp" placeholder="Όνομα Ταμείου (π.χ. Μαρία)" data-i18n-placeholder="placeholder_cashier_name">
            <button class="btn-main" id="btnAdminLogin" style="background:#2196F3; color:white;" onclick="Admin.manualLogin()" data-i18n="login_btn">ΕΙΣΟΔΟΣ</button>
            <div class="divider" data-i18n="or">Ή</div>
            <button class="btn-main btn-google" onclick="Admin.googleLogin()"><span>G</span> <span data-i18n="google_login">Σύνδεση Google</span></button>
            <button class="btn-back" onclick="UI.showRoles()" data-i18n="back_btn">🔙 ΠΙΣΩ</button>
        </div>

    <div id="pinModal">
        <div class="pin-box">
            <h3 id="pinTitle" style="margin:0; color:#FFD700;" data-i18n="enter_pin">ΕΙΣΑΓΩΓΗ PIN</h3>
            <p id="pinSub" style="font-size:12px; color:#aaa;" data-i18n="enter_your_pin">Εισάγετε τον κωδικό καταστήματος</p>
            <div id="pinDisplay" class="pin-display"></div>
            <div class="numpad">
                <button class="num-btn" onclick="PIN.add(1)">1</button>
                <button class="num-btn" onclick="PIN.add(2)">2</button>
                <button class="num-btn" onclick="PIN.add(3)">3</button>
                <button class="num-btn" onclick="PIN.add(4)">4</button>
                <button class="num-btn" onclick="PIN.add(5)">5</button>
                <button class="num-btn" onclick="PIN.add(6)">6</button>
                <button class="num-btn" onclick="PIN.add(7)">7</button>
                <button class="num-btn" onclick="PIN.add(8)">8</button>
                <button class="num-btn" onclick="PIN.add(9)">9</button>
                <button class="num-btn" style="background:#D32F2F;" onclick="PIN.clear()">C</button>
                <button class="num-btn" onclick="PIN.add(0)">0</button>
                <button class="num-btn" style="background:#00E676; color:black;" onclick="PIN.submit()">OK</button>
            </div>
            <button id="btnForgot" class="forgot-link" onclick="PIN.resetFlow()" data-i18n="forgot_pin">Ξέχασα το PIN</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { firebaseConfig } from './config.js';
        import { Sundromes } from './sundromes.js'; // ✅ Import Sundromes

        if ('serviceWorker' in navigator) {
            // ✅ FIX: Καθαρισμός παλιού Root Service Worker που προκαλεί προβλήματα
            navigator.serviceWorker.getRegistrations().then(regs => {
                regs.forEach(reg => {
                    if (reg.scope === window.location.origin + '/') {
                        reg.unregister().then(() => console.log('🧹 Old Root SW Removed'));
                    }
                });
            });
            // ✅ FIX: Εγγραφή με Scope /manage/ για απομόνωση
            navigator.serviceWorker.register('/sw.js', { scope: '/manage/' }).then(() => console.log("✅ Login SW Registered"));
        }

        let deferredPrompt;
        const btnInstall = document.getElementById('btnInstall');
        const isAndroid = /Android/i.test(navigator.userAgent);

        if (isAndroid) {
            btnInstall.innerText = "🤖 ΚΑΤΕΒΑΣΤΕ ΤΟ APP (APK)";
            btnInstall.style.display = "block";
            btnInstall.style.background = "#FF9800";
        } else {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                btnInstall.innerText = "📲 ΕΓΚΑΤΑΣΤΑΣΗ ΕΦΑΡΜΟΓΗΣ";
                btnInstall.style.display = 'block';
            });
        }

        window.handleInstall = async () => {
            if (isAndroid) {
                window.location.href = "https://github.com/theroasters84-wq/bellgo-final/releases/download/v.1.5.0/app-release.apk";
            } else if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') btnInstall.style.display = 'none';
                deferredPrompt = null;
            }
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const socket = io({ transports: ['polling', 'websocket'] });

        let currentPinMode = 'enter'; 
        let tempPin = '';
        let pinValue = '';
        let adminUser = null; 
        let adminPlan = 'basic';

        // --- I18N LOGIC ---
        let translations = {};
        const t = (key) => translations[key] || key;

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const emailParam = urlParams.get('email');
            
            // ✅ NEW: Αυτόματη Είσοδος (Αν υπάρχει αποθηκευμένο session και δεν επιστρέφουμε από Stripe)
            if (!emailParam) {
                const savedSession = localStorage.getItem('bellgo_session');
                if (savedSession) {
                    try {
                        const session = JSON.parse(savedSession);
                        if (session && session.role) {
                            // Έλεγχος Ρόλου και ανακατεύθυνση
                            if (session.role === 'admin') {
                                if (session.plan === 'premium') {
                                    const adminMode = localStorage.getItem('bellgo_admin_mode');
                                    window.location.replace(adminMode === 'kitchen' ? "/manage/kitchen.html" : "/manage/premium.html");
                                } else {
                                    window.location.replace("/manage/index.html");
                                }
                            } else {
                                // Staff (waiter/driver)
                                if (session.role === 'driver') {
                                    window.location.replace("/staff/driver");
                                } else {
                                    window.location.replace(session.plan === 'premium' ? "/staff/app" : "/manage/index.html");
                                }
                            }
                            return; // Σταματάμε εδώ για να μην φορτώσει η φόρμα
                        }
                    } catch (e) { localStorage.removeItem('bellgo_session'); }
                }
            }

            if (emailParam) {
                document.getElementById('adminEmailInp').value = emailParam;
                Admin.manualLogin();
            } else {
                const savedEmail = localStorage.getItem('bellgo_last_email');
                if(savedEmail) document.getElementById('adminEmailInp').value = savedEmail;
            }

            // Load Language
            const savedLang = localStorage.getItem('bellgo_lang') || 'el';
            setLanguage(savedLang);
        };

        // --- UI NAVIGATION ---
        window.UI = {
            showRoles: () => {
                document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
                document.getElementById('roleSelection').classList.add('active');
            },
            showAdminLogin: (mode) => {
                if(mode) { localStorage.setItem('bellgo_admin_mode', mode); } // ✅ Αποθήκευση Mode (cashier/kitchen)
                document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
                document.getElementById('adminForm').classList.add('active');
            },
            showStaffLogin: (role) => {
                document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
                document.getElementById('staffForm').classList.add('active');
                const sel = document.getElementById('stRole');
                if(sel) sel.value = role;
            },
            togglePinVisibility: () => {
                const inp = document.getElementById('stPin');
                inp.type = inp.type === 'password' ? 'text' : 'password';
            },
            goToBuy: (plan) => {
                // Πρέπει να πάει στο Admin Form για να βάλει email
                UI.showAdminLogin();
                alert("Παρακαλώ εισάγετε το Email σας και πατήστε Είσοδος. Αν δεν έχετε συνδρομή, θα σας ζητηθεί να αγοράσετε.");
                // Σημείωση: Η λογική αγοράς είναι ενσωματωμένη στο Admin.manualLogin ή Admin.buyPackage
                // Εδώ απλά τον στέλνουμε εκεί, ή μπορούμε να καλέσουμε απευθείας αν έχει συμπληρώσει email.
                const email = document.getElementById('adminEmailInp').value.trim();
                if(email) Admin.buyPackage(plan);
            },
        };

        window.PIN = {
            add: (n) => { if (pinValue.length < 4) { pinValue += n; PIN.updateDisplay(); } },
            clear: () => { pinValue = ''; PIN.updateDisplay(); },
            updateDisplay: () => { document.getElementById('pinDisplay').innerText = '*'.repeat(pinValue.length); },
            resetFlow: () => {
                if(!confirm("Θέλετε να ορίσετε νέο κωδικό;")) return;
                currentPinMode = 'create'; pinValue = ''; PIN.updateDisplay();
                document.getElementById('pinTitle').innerText = t('create_pin') || "ΝΕΟ PIN";
                document.getElementById('pinSub').innerText = t('set_new_pin') || "Ορίστε νέο 4-ψήφιο κωδικό";
                document.getElementById('btnForgot').style.display = 'none';
            },
            submit: () => {
                if (pinValue.length < 4) return alert("Το PIN πρέπει να είναι 4 ψηφία");
                if (currentPinMode === 'enter') {
                    socket.emit('verify-pin', { pin: pinValue, email: adminUser.email });
                } else if (currentPinMode === 'create') {
                    tempPin = pinValue; pinValue = ''; PIN.updateDisplay();
                    currentPinMode = 'confirm';
                    document.getElementById('pinTitle').innerText = t('confirm') || "ΕΠΙΒΕΒΑΙΩΣΗ";
                    document.getElementById('pinSub').innerText = t('type_again') || "Πληκτρολογήστε το ξανά";
                } else if (currentPinMode === 'confirm') {
                    if (pinValue === tempPin) {
                        socket.emit('set-new-pin', { pin: pinValue, email: adminUser.email });
                    } else { alert("Οι κωδικοί δεν ταιριάζουν."); currentPinMode = 'create'; pinValue = ''; PIN.updateDisplay(); }
                }
            }
        };

        window.Staff = {
            login: () => {
                const name = document.getElementById('stName').value.trim();
                const pin = document.getElementById('stPin').value.trim();
                const role = document.getElementById('stRole').value;
                const adminEmail = document.getElementById('stStore').value.trim(); 

                if (!name || !pin || !adminEmail) return alert("Συμπληρώστε τα πεδία!");
                
                const btn = document.getElementById('btnStaffLogin');
                btn.innerText = "ΕΛΕΓΧΟΣ..."; btn.disabled = true;

                socket.emit('verify-pin', { pin: pin, email: adminEmail });
                
                socket.once('pin-verified', async (res) => {
                    if (res.success) {
                        try {
                            const subRes = await fetch('/check-subscription', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ email: adminEmail })
                            });
                            const subData = await subRes.json();
                            
                            let isActive = subData.active;
                            let features = subData.features || {};
                            let plan = subData.plan;

                            // ✅ NEW: Merge Temp Features (Simulation)
                            const tempFeatures = localStorage.getItem('bellgo_temp_features');
                            if (tempFeatures) {
                                isActive = true; // Force active for simulation
                                try { features = { ...features, ...JSON.parse(tempFeatures) }; } catch(e){}
                                plan = 'custom'; // ✅ Force custom plan to respect features
                            }

                            if (isActive) {
                                const sessionData = { name: name, store: 
                                const sessionData = { name: name, store: subData.storeId || adminEmail, role: role, plan: plan, features: features };
                                // ✅ FIX: Clear any temp features from simulation to ensure clean state
                                localStorage.removeItem('bellgo_temp_features');
                                
                                localStorage.setItem('bellgo_session', JSON.stringify(sessionData));

                                if (plan === 'premium' || plan === 'custom') {
                                    if (role === 'driver') {
                                        window.location.replace("/staff/driver");
                                    } else {
                                        window.location.replace("/staff/app");
                                    }
                                } else {
                                    window.location.replace("/manage/index.html"); 
                                }
                            } else {
                                alert("Δεν βρέθηκε ενεργή συνδρομή για αυτό το κατάστημα.");
                                btn.innerText = "ΕΙΣΟΔΟΣ"; btn.disabled = false;
                            }
                        } catch (e) { 
                            alert("Σφάλμα δικτύου."); 
                            btn.innerText = "ΕΙΣΟΔΟΣ"; btn.disabled = false;
                        }
                    } else {
                        alert("Λάθος PIN!");
                        PIN.clear();
                        btn.innerText = "ΕΙΣΟΔΟΣ"; btn.disabled = false;
                    }
                });
            }
        };

        window.Admin = {
            manualLogin: async () => {
                const email = document.getElementById('adminEmailInp').value.trim();
                const name = document.getElementById('adminNameInp').value.trim(); // ✅ Λήψη Ονόματος
                if(!email) return alert("Παρακαλώ εισάγετε email.");
                localStorage.setItem('bellgo_last_email', email); // ✅ Save email for next time
                
                const btn = document.getElementById('btnAdminLogin');
                btn.innerText = "ΕΛΕΓΧΟΣ..."; btn.disabled = true;

                // ✅ HACK: Παράκαμψη Stripe για Demo Emails (που τελειώνουν σε 1992+)
                // Αν το email έχει έτος >= 1992, το θεωρούμε Premium και μπαίνουμε.
                const match = email.match(/(\d{4})$/);
                if (match) {
                    const year = parseInt(match[1]);
                    if (year >= 1992) {
                        adminUser = { email: email, displayName: name || "Admin", features: {} }; // Hack features handled in premium.js
                        adminPlan = 'premium'; // Force premium για να μπει στο dashboard
                        socket.emit('check-pin-status', { email: email });
                        btn.innerText = "ΕΙΣΟΔΟΣ"; btn.disabled = false;
                        return; // Σταματάμε εδώ, δεν καλούμε το Stripe
                    }
                }

                try {
                    const response = await fetch('/check-subscription', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email })
                    });
                    const data = await response.json();

                    if (data.active) {
                        adminUser = { email: email, displayName: name || "Admin" }; // ✅ Χρήση Ονόματος
                        adminPlan = data.plan; 
                        adminUser.features = data.features || {}; // ✅ Save Features from Stripe
                        
                        // ✅ NEW: Merge Temp Features (Simulation)
                        const tempFeatures = localStorage.getItem('bellgo_temp_features');
                        if (tempFeatures) { 
                            try { adminUser.features = { ...adminUser.features, ...JSON.parse(tempFeatures) }; } catch(e){} 
                            adminPlan = 'custom'; // ✅ Force custom plan
                        }

                        socket.emit('check-pin-status', { email: email });
                    } else {
                        // ✅ FREE TIER: Allow login without subscription
                        adminUser = { email: email, displayName: name || "Admin" };
                        adminPlan = 'basic';
                        adminUser.features = {}; 
                        
                        // ✅ NEW: Merge Temp Features (Simulation)
                        const tempFeatures = localStorage.getItem('bellgo_temp_features');
                        if (tempFeatures) { 
                            try { adminUser.features = { ...adminUser.features, ...JSON.parse(tempFeatures) }; } catch(e){} 
                            adminPlan = 'custom'; // ✅ Force custom plan
                        }

                        socket.emit('check-pin-status', { email: email });
                    }
                    btn.innerText = "ΕΙΣΟΔΟΣ"; btn.disabled = false;
                } catch (e) { 
                    alert("Σφάλμα σύνδεσης."); 
                    btn.innerText = "ΕΙΣΟΔΟΣ"; btn.disabled = false;
                }
            },

            googleLogin: () => {
                signInWithPopup(auth, provider).then(async (result) => {
                    const email = result.user.email;
                    const response = await fetch('/check-subscription', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email })
                    });
                    const data = await response.json();
                    
                    // ✅ FREE TIER: Allow login regardless of subscription status
                    adminUser = result.user;
                    adminPlan = data.active ? data.plan : 'basic';
                    adminUser.features = data.features || {};

                    // ✅ NEW: Merge Temp Features (Simulation)
                    const tempFeatures = localStorage.getItem('bellgo_temp_features');
                    if (tempFeatures) { 
                        try { adminUser.features = { ...adminUser.features, ...JSON.parse(tempFeatures) }; } catch(e){} 
                        adminPlan = 'custom'; // ✅ Force custom plan
                    }

                    socket.emit('check-pin-status', { email: email });

                }).catch((error) => alert(error.message));
            },

            buyPackage: async (plan) => {
                const email = document.getElementById('adminEmailInp').value.trim();
                if(!email) return alert("Βάλτε το email σας στο πεδίο από πάνω!");

                const res = await fetch('/create-checkout-session', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: email, plan: plan })
                });
                const data = await res.json();
                if(data.url) window.location.href = data.url;
                else alert("Σφάλμα σύνδεσης με Stripe");
            }
        };

        // --- SOCKET LISTENERS ---
        socket.on('pin-status', (data) => {
            document.getElementById('pinModal').style.display = 'flex';
            if (data.hasPin) {
                currentPinMode = 'enter';
                document.getElementById('pinTitle').innerText = t('enter_pin') || "ΕΙΣΑΓΩΓΗ PIN";
                document.getElementById('pinSub').innerText = t('enter_your_pin') || "Βάλτε τον κωδικό σας";
                document.getElementById('btnForgot').style.display = 'block';
            } else {
                currentPinMode = 'create';
                document.getElementById('pinTitle').innerText = t('create_pin') || "ΔΗΜΙΟΥΡΓΙΑ PIN";
                document.getElementById('pinSub').innerText = t('set_new_pin') || "Ορίστε έναν νέο 4-ψήφιο κωδικό";
                document.getElementById('btnForgot').style.display = 'none';
            }
        });

        socket.on('pin-success', (data) => {
            const sessionData = { name: adminUser.displayName, store: adminUser.email, role: 'admin', email: adminUser.email, plan: adminPlan, features: adminUser.features };
            localStorage.setItem('bellgo_session', JSON.stringify(sessionData));
            
            if(adminPlan === 'premium' || adminPlan === 'custom') {
                const adminMode = localStorage.getItem('bellgo_admin_mode');
                if (adminMode === 'kitchen') {
                    window.location.replace("/manage/kitchen.html");
                } else {
                    window.location.replace("/manage/premium.html");
                }
            }
            else window.location.replace("/manage/index.html");
        });

        socket.on('pin-verified', (res) => {
            // 🔥 FIXED: Only run if Modal is OPEN (Admin Flow)
            if (document.getElementById('pinModal').style.display === 'flex' && currentPinMode === 'enter') {
                if (res.success) {
                    const sessionData = { name: adminUser.displayName, store: adminUser.email, role: 'admin', email: adminUser.email, plan: adminPlan, features: adminUser.features };
                    localStorage.setItem('bellgo_session', JSON.stringify(sessionData));
                    
                    if(adminPlan === 'premium' || adminPlan === 'custom') {
                        const adminMode = localStorage.getItem('bellgo_admin_mode');
                        if (adminMode === 'kitchen') {
                            window.location.replace("/manage/kitchen.html");
                        } else {
                            window.location.replace("/manage/premium.html");
                        }
                    }
                    else window.location.replace("/manage/index.html");
                } else {
                    alert("Λάθος PIN!");
                    PIN.clear();
                }
            }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user && !localStorage.getItem('bellgo_session')) {
                document.getElementById('adminEmailInp').value = user.email;
            }
        });

        window.setLanguage = async (lang) => {
            localStorage.setItem('bellgo_lang', lang);
            try {
                const response = await fetch(`/i18n/${lang}.json`);
                translations = await response.json();
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (translations[key]) el.innerText = translations[key];
                });
                document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                    const key = el.getAttribute('data-i18n-placeholder');
                    if (translations[key]) el.placeholder = translations[key];
                });
            } catch (error) { console.error(`Lang Error: ${lang}`, error); }
        };
    </script>
</body>
</html>
