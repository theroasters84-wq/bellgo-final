<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Generator</title>
    
    <link rel="manifest" href="/manifest.json?id=genitria">
    <meta name="theme-color" content="#10B981">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔲</text></svg>">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔲</text></svg>">

    <!-- Βιβλιοθήκη για QR Codes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f8;
            color: #1f2937;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header {
            background: #10B981;
            color: white;
            width: 100%;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        .container {
            flex: 1;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus { border-color: #10B981; }
        button {
            width: 100%;
            padding: 15px;
            background: #10B981;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
            transition: background 0.3s;
            margin-bottom: 20px;
        }
        button:active { background: #0d9668; }
        #qrcode {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
            margin-bottom: 20px;
        }
        #btnInstall {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: auto;
            padding: 12px 20px;
            background: #10B981;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            z-index: 1000;
            margin: 0;
        }
        #btnDownload {
            display: none;
            background: #635BFF;
            box-shadow: 0 4px 10px rgba(99, 91, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="header">Γεννήτρια QR 📱</div>

    <div class="container">
        <input type="text" id="inpLink" placeholder="Επικολλήστε το Link εδώ...">
        <button onclick="generateQR()">ΔΗΜΙΟΥΡΓΙΑ QR</button>
        
        <div id="qrcode"></div>
        
        <button id="btnDownload" onclick="downloadQR()">⬇️ ΛΗΨΗ QR (DOWNLOAD)</button>
        <button id="btnInstall" onclick="installApp()">📲 INSTALL</button>
    </div>

    <script>
        // Αυτόματη δημιουργία του QR Code κατά το άνοιγμα της σελίδας
        window.onload = () => {
            const initialLink = document.getElementById('inpLink').value.trim();
            if (initialLink) generateQR();
        };

        function generateQR() {
            const link = document.getElementById('inpLink').value.trim();
            if (!link) return alert('Παρακαλώ εισάγετε ένα link!');
            
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = ''; 
            qrContainer.style.display = 'flex';
            qrContainer.style.justifyContent = 'center';
            
            new QRCode(qrContainer, {
                text: link,
                width: 250,
                height: 250,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
            
            document.getElementById('btnDownload').style.display = 'block';
        }

        async function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (canvas) {
                const dataUrl = canvas.toDataURL("image/png");
                
                // 🚀 NATIVE SHARE API: Το απόλυτο εργαλείο για PWAs (Κινητά iOS/Android)
                if (navigator.share) {
                    try {
                        const response = await fetch(dataUrl);
                        const blob = await response.blob();
                        const file = new File([blob], 'bellgo_qr.png', { type: 'image/png' });
                        
                        if (navigator.canShare && navigator.canShare({ files: [file] })) {
                            await navigator.share({ title: 'QR Code', files: [file] });
                            return; // Αν πετύχει το native share, σταματάμε εδώ!
                        }
                    } catch (err) { console.log("Share API error:", err); }
                }

                // 💻 FALLBACK: Κανονικό κατέβασμα (για PC / παλιά Android)
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = 'bellgo_qr.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } else {
                alert("Δεν βρέθηκε το QR code. Παρακαλώ δοκιμάστε ξανά.");
            }
        }

        // --- PWA INSTALLATION LOGIC ---
        if ('serviceWorker' in navigator) {
            // Εγγράφουμε το service worker με scope μόνο σε αυτή τη σελίδα για να μην επηρεάζει τις άλλες
            navigator.serviceWorker.register('/sw.js', { scope: '/genitria.html' })
                .then(() => console.log('✅ QR Generator SW Registered'));
        }

        let deferredPrompt;
        const btnInstall = document.getElementById('btnInstall');
        const isIos = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        // Εμφάνιση του κουμπιού by default στα iPhone επειδή ΔΕΝ υποστηρίζουν το beforeinstallprompt event
        if (isIos && !isStandalone) {
            btnInstall.style.display = 'block';
            btnInstall.innerHTML = '📲 INSTALL';
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            if (isStandalone) return; // ✅ Κρύβει το κουμπί αν το έχουμε ήδη κατεβάσει
            e.preventDefault();
            deferredPrompt = e;
            btnInstall.style.display = 'block';
            btnInstall.innerHTML = '📲 INSTALL';
        });

        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') btnInstall.style.display = 'none';
                deferredPrompt = null;
            } else {
                if (isIos) {
                    alert("Για να εγκαταστήσετε την εφαρμογή στο iPhone:\n1. Πατήστε το κουμπί 'Share' (το τετράγωνο με το βελάκι)\n2. Επιλέξτε 'Προσθήκη στην Οθόνη Αφετηρίας'");
                }
            }
        }
    </script>
</body>
</html>
