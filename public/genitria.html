    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f8;
            color: #1f2937;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header {
            background: #10B981;
            color: white;
            width: 100%;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        .container {
            flex: 1;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus { border-color: #10B981; }
        button {
            width: 100%;
            padding: 15px;
            background: #10B981;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
            transition: background 0.3s;
            margin-bottom: 20px;
        }
        button:active { background: #0d9668; }
        #qrcode {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
            margin-bottom: 20px;
        }
        #btnInstall {
            display: none;
            background: #2196F3;
            box-shadow: 0 4px 10px rgba(33, 150, 243, 0.3);
        }
    </style>
</head>
<body>

    <div class="header">Γεννήτρια QR 📱</div>

    <div class="container">
        <input type="text" id="inpLink" placeholder="Επικολλήστε το Link εδώ...">
        <button onclick="generateQR()">ΔΗΜΙΟΥΡΓΙΑ QR</button>
        
        <div id="qrcode"></div>
        
        <button id="btnInstall" onclick="installApp()">⬇️ ΕΓΚΑΤΑΣΤΑΣΗ ΕΦΑΡΜΟΓΗΣ (PWA)</button>
    </div>

    <script>

                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        // --- PWA INSTALLATION LOGIC ---
        if ('serviceWorker' in navigator) {
            // Εγγράφουμε το service worker με scope μόνο σε αυτή τη σελίδα για να μην επηρεάζει τις άλλες
            navigator.serviceWorker.register('/sw.js', { scope: '/genitria.html' })
                .then(() => console.log('✅ QR Generator SW Registered'));
        }

        let deferredPrompt;
        const btnInstall = document.getElementById('btnInstall');
        const isIos = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        // Εμφάνιση του κουμπιού by default στα iPhone επειδή ΔΕΝ υποστηρίζουν το beforeinstallprompt event
        if (isIos && !isStandalone) {
            btnInstall.style.display = 'block';
            btnInstall.innerHTML = '⬇️ ΕΓΚΑΤΑΣΤΑΣΗ (IPHONE)';
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            btnInstall.style.display = 'block';
            btnInstall.innerHTML = '⬇️ ΕΓΚΑΤΑΣΤΑΣΗ ΕΦΑΡΜΟΓΗΣ (ANDROID)';
        });

        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') btnInstall.style.display = 'none';
                deferredPrompt = null;
            } else {
                if (isIos) {
                    alert("Για να εγκαταστήσετε την εφαρμογή στο iPhone:\n1. Πατήστε το κουμπί 'Share' (το τετράγωνο με το βελάκι)\n2. Επιλέξτε 'Προσθήκη στην Οθόνη Αφετηρίας'");
                }
            }
        }
    </script>
</body>
</html>
